<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网络测速</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <section class="hero-stage">
        <header class="top-metrics">
          <div class="metric-cluster">
            <div class="metric-title-row">
              <span class="metric-icon down">↓</span>
              <span class="metric-title">下载 Mbps</span>
            </div>
            <strong id="downloadHeadline" class="metric-headline">--</strong>
          </div>
          <div class="metric-cluster">
            <div class="metric-title-row">
              <span class="metric-icon up">↑</span>
              <span class="metric-title">上传 Mbps</span>
            </div>
            <strong id="uploadHeadline" class="metric-headline">--</strong>
          </div>
        </header>

        <section class="latency-strip">
          <span class="latency-label">Ping ms</span>
          <div class="latency-chip-row">
            <span class="latency-chip">
              <span class="latency-chip-icon ping">⚡</span>
              <strong id="avgLatency">--</strong>
            </span>
            <span class="latency-chip">
              <span class="latency-chip-icon down">↓</span>
              <strong id="minLatency">--</strong>
            </span>
            <span class="latency-chip">
              <span class="latency-chip-icon up">↑</span>
              <strong id="jitterLatency">--</strong>
            </span>
          </div>
        </section>

        <section class="gauge-stage">
          <div class="gauge-wrap">
            <svg id="speedGauge" class="speed-gauge" viewBox="0 0 560 420" role="img" aria-label="测速仪表盘"></svg>
            <div class="gauge-center">
              <span id="gaugeMode" class="gauge-mode">准备开始</span>
              <strong id="gaugeValue" class="gauge-value">0.00</strong>
              <span id="gaugeUnit" class="gauge-unit">Mbps</span>
            </div>
          </div>
        </section>

        <section class="client-band">
          <div class="client-cell">
            <span class="client-caption">客户端 IP</span>
            <strong id="clientIp" class="client-primary">--</strong>
            <span class="client-secondary">当前访问地址</span>
          </div>
          <div class="client-seal">◎</div>
          <div class="client-cell client-cell-right">
            <span class="client-caption">浏览器 UA</span>
            <strong id="clientUa" class="client-primary">--</strong>
            <span id="phaseBadge" class="client-secondary">等待开始</span>
          </div>
        </section>

        <section class="control-bar">
          <div class="button-stack">
            <button id="startButton" class="primary-button">开始测速</button>
            <button id="retryButton" class="secondary-button" hidden>重新测试</button>
          </div>
          <div class="status-block">
            <p id="statusText" class="status-text">准备就绪</p>
            <ol class="steps" id="steps">
              <li data-step="latency" class="step-item">延迟测试</li>
              <li data-step="download" class="step-item">下载测速</li>
              <li data-step="upload" class="step-item">上传测速</li>
            </ol>
          </div>
        </section>

        <section class="timeline-panel">
          <div class="timeline-header">
            <div>
              <h2>20 次 Ping 趋势</h2>
              <p id="latencyMeta" class="timeline-copy">尚未开始测速</p>
            </div>
            <div class="timeline-stats">
              <span id="latencyCount" class="timeline-pill">0 / 20</span>
              <span id="latencySummary" class="timeline-pill accent">--</span>
              <span id="maxLatency" class="timeline-pill">--</span>
            </div>
          </div>
          <div class="timeline-shell">
            <div id="latencyChart" class="latency-chart-empty">等待测速开始</div>
          </div>
        </section>
      </section>
    </main>

    <script>
      window.SPEEDTEST_CONFIG = {{ .Config }};
    </script>
    <script src="/app.js" defer></script>
  </body>
</html>
