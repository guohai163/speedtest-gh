services:
  speedtest-web:
    image: ghcr.io/guohai163/speedtest-gh:latest
    container_name: speedtest-web
    pull_policy: always
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DOWNLOAD_DURATION_SECONDS: "8"
      UPLOAD_DURATION_SECONDS: "8"
      MAX_UPLOAD_SIZE_MB: "200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
