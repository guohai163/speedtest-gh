<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网络测速</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card">
        <p class="eyebrow">Speedtest</p>
        <h1>测速页面</h1>
        <p class="hero-copy">
          一键完成 20 次延迟测试，并继续测试下载与上传速度。
        </p>
        <div class="action-row">
          <button id="startButton" class="primary-button">开始测速</button>
          <button id="retryButton" class="secondary-button" hidden>重新测试</button>
        </div>
        <p id="statusText" class="status-text">准备就绪</p>
      </section>

      <section class="panel-grid">
        <article class="panel">
          <div class="panel-header">
            <h2>测试进度</h2>
            <span id="phaseBadge" class="phase-badge idle">等待开始</span>
          </div>
          <ol class="steps" id="steps">
            <li data-step="latency" class="step-item">延迟测试 20 次</li>
            <li data-step="download" class="step-item">下载测速</li>
            <li data-step="upload" class="step-item">上传测速</li>
          </ol>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>延迟统计</h2>
            <span id="latencySummary" class="metric-big">--</span>
          </div>
          <div class="metrics-grid">
            <div class="metric-card">
              <span class="metric-label">平均</span>
              <strong id="avgLatency">--</strong>
            </div>
            <div class="metric-card">
              <span class="metric-label">最小</span>
              <strong id="minLatency">--</strong>
            </div>
            <div class="metric-card">
              <span class="metric-label">最大</span>
              <strong id="maxLatency">--</strong>
            </div>
            <div class="metric-card">
              <span class="metric-label">抖动</span>
              <strong id="jitterLatency">--</strong>
            </div>
          </div>
          <p id="latencyMeta" class="panel-footnote">尚未开始测速</p>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>速度结果</h2>
          </div>
          <div class="metrics-grid">
            <div class="metric-card">
              <span class="metric-label">下载</span>
              <strong id="downloadSpeed">--</strong>
            </div>
            <div class="metric-card">
              <span class="metric-label">上传</span>
              <strong id="uploadSpeed">--</strong>
            </div>
          </div>
          <p class="panel-footnote">结果单位为 Mbps</p>
        </article>

        <article class="panel panel-wide">
          <div class="panel-header">
            <h2>20 次延迟明细</h2>
            <span id="latencyCount" class="pill">0 / 20</span>
          </div>
          <div id="latencyList" class="latency-list"></div>
        </article>
      </section>
    </main>

    <script>
      window.SPEEDTEST_CONFIG = {{ .Config }};
    </script>
    <script src="/app.js" defer></script>
  </body>
</html>
